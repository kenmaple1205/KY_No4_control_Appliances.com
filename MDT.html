<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dispatch Code Sender</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #172033;
      --panel-2: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #334155;
      --green: #1f7a46;
      --green-dark: #166534;
      --red: #b91c1c;
      --red-dark: #991b1b;
      --button: #374151;
      --button-hover: #4b5563;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 22px 0 32px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 40px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .clock {
      min-width: 142px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.72);
      text-align: right;
      box-shadow: var(--shadow);
    }

    .clock .time {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .clock .date {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(17, 24, 39, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 16px 18px;
      font-size: 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.76);
    }

    .settings {
      padding: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font: inherit;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .field {
      margin-bottom: 14px;
    }

    .hint {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row input[type="checkbox"] {
      width: auto;
      accent-color: #22c55e;
    }

    .checkbox-label {
      display: flex;
      gap: 9px;
      align-items: center;
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      color: #cbd5e1;
    }

    button {
      border: 0;
      border-radius: 14px;
      background: var(--button);
      color: white;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.12s ease, background 0.12s ease;
      user-select: none;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .primary {
      background: var(--blue);
    }

    .primary:hover {
      background: var(--blue-dark);
    }

    .danger {
      background: var(--red);
    }

    .danger:hover {
      background: var(--red-dark);
    }

    .success {
      background: var(--green);
    }

    .success:hover {
      background: var(--green-dark);
    }

    .tab-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(88px, 1fr));
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.42);
    }

    .tab {
      min-height: 64px;
      border: 2px solid transparent;
      background: var(--green-dark);
    }

    .tab.active {
      border-color: #fca5a5;
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.14);
    }

    .tab small {
      display: block;
      margin-top: 3px;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 600;
    }

    .code-area {
      padding: 18px;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .category-title {
      margin: 0;
      font-size: 28px;
    }

    .category-count {
      color: var(--muted);
      font-weight: 700;
    }

    .codes {
      display: grid;
      grid-template-columns: repeat(4, minmax(108px, 1fr));
      gap: 12px;
    }

    .code-button {
      min-height: 92px;
      border: 2px solid #4b5563;
      background: linear-gradient(180deg, #394152, #2b3343);
      color: #f8fafc;
      font-size: clamp(26px, 4vw, 46px);
      letter-spacing: 0.045em;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .code-button.selected {
      border-color: #f87171;
      background: linear-gradient(180deg, #ef4444, #991b1b);
      box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.18);
    }

    .send-panel {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      margin-top: 18px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.55);
    }

    .selected-text {
      color: #cbd5e1;
      font-weight: 800;
    }

    .selected-text strong {
      color: #fff;
      font-size: 20px;
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .status.ok {
      color: #86efac;
    }

    .status.error {
      color: #fca5a5;
    }

    @media (max-width: 920px) {
      header,
      .layout {
        grid-template-columns: 1fr;
      }

      header {
        display: block;
      }

      .clock {
        margin-top: 12px;
        text-align: left;
      }

      .tab-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .codes {
        grid-template-columns: repeat(2, 1fr);
      }

      .send-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Dispatch Code Sender</h1>
        <p class="subtitle">選擇分類及代碼，按下送出即可送出。</p>
      </div>
      <div class="clock" aria-live="polite">
        <div class="time" id="clockTime">--:--:--</div>
        <div class="date" id="clockDate">----</div>
      </div>
    </header>

    <section class="layout">
      <aside class="card">
        <h2>Discord 設定</h2>
        <div class="settings">
          <div class="field">
            <label for="vehicleId">車輛 / 單位名稱（可選）</label>
            <input id="vehicleId" type="text" placeholder="例如：MP" />
          </div>

          <div class="field">
            <label for="messageTemplate">Discord 訊息格式</label>
            <textarea id="messageTemplate">[{category}] {code}</textarea>
            <p class="hint">可用變數：<code>{category}</code>、<code>{code}</code>、<code>{unit}</code>、<code>{time}</code></p>
          </div>
        </div>
      </aside>

      <section class="card">
        <nav class="tab-grid" id="categoryTabs" aria-label="分類"></nav>
        <div class="code-area">
          <div class="category-head">
            <h2 class="category-title" id="categoryTitle">事故</h2>
            <div class="category-count" id="categoryCount">0 codes</div>
          </div>
          <div class="codes" id="codes"></div>

          <div class="send-panel">
            <div class="selected-text" id="selectedText">尚未選擇代碼</div>
            <button class="success" id="sendSelected" type="button" disabled>送出選取代碼</button>
            <button class="primary" id="sendCategory" type="button">送出整個分類</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </section>
    </section>
  </main>

  <script>

    const categories = [
      {
        name: '事故',
        english: 'Accident',
        codes: ['ARF', 'ARR', 'ARS', 'ASF', 'FSR', 'FUC', 'ISO', 'RES', 'SSI', 'SSM', 'TRC', 'VER']
      },
      {
        name: '候命',
        english: 'Standby',
        codes: ['AVA', 'AVB', 'AVC', 'AVD', 'AVE', 'AVF', 'AVI', 'AVJ', 'AVL', 'AVM', 'AVR', 'AVS', 'AVU', 'AVV', 'AVX', 'AVZ']
      },
      {
        name: '停用',
        english: 'Unavailable',
        codes: ['XEQ', 'XIC', 'XMF', 'XMR', 'XOC', 'XRG', 'XRS', 'XRW', 'XSA', 'XSB', 'XSC', 'XSD', 'XSV', 'XTA', 'XAM', 'XCH']
      },
      {
        name: '火警升級',
        english: 'Fire Upgrade',
        codes: ['AL1', 'AL2', 'AL3', 'AL4', 'AL5', 'ALD', '2ST', '3ST', '1VF', '2VF', '3VF']
      },
      {
        name: '停止增援',
        english: 'Stop Reinforcement',
        codes: ['SAA', 'SAM', 'SCB', 'SDO', 'SEL', 'SGI', 'SGL', 'SHG', 'SIM', 'SJP', 'SLF', 'SLI', 'SLO', 'SLT', 'SMA', 'SMS']
      },
      {
        name: '一般',
        english: 'General',
        codes: ['BRO', 'CSA', 'CSB', 'CSC', 'CSK', 'EMG', 'FBR', 'MOV', 'PUC', 'RLF', 'RTS', 'TNL', 'TRA', 'FOD', 'FOU']
      },
      {
        name: '其他',
        english: 'Other',
        codes: ['EIP', 'HOA', 'INP', 'NSF', 'RMU']
      }
    ];

    const elements = {
      tabs: document.querySelector('#categoryTabs'),
      codes: document.querySelector('#codes'),
      title: document.querySelector('#categoryTitle'),
      count: document.querySelector('#categoryCount'),
      selectedText: document.querySelector('#selectedText'),
      status: document.querySelector('#status'),
      sendSelected: document.querySelector('#sendSelected'),
      sendCategory: document.querySelector('#sendCategory'),
      vehicleId: document.querySelector('#vehicleId'),
      messageTemplate: document.querySelector('#messageTemplate'),
      clockTime: document.querySelector('#clockTime'),
      clockDate: document.querySelector('#clockDate')
    };

    let activeCategoryIndex = 0;
    let selectedCode = '';

    function init() {
      const savedUnit = localStorage.getItem('dispatchUnit');
      const savedTemplate = localStorage.getItem('dispatchTemplate');

      if (savedUnit) elements.vehicleId.value = savedUnit;
      if (savedTemplate) elements.messageTemplate.value = savedTemplate;

      renderTabs();
      renderCodes();
      bindEvents();
      updateClock();
      setInterval(updateClock, 1000);
    }

    function bindEvents() {
      elements.sendSelected.addEventListener('click', () => {
        if (!selectedCode) return;
        sendCode(getActiveCategory(), selectedCode);
      });

      elements.sendCategory.addEventListener('click', () => {
        const category = getActiveCategory();
        const message = category.codes.map(code => buildMessage(category.name, code)).join('\n');
        sendDiscord(message);
      });

      elements.vehicleId.addEventListener('input', saveSettings);
      elements.messageTemplate.addEventListener('input', saveSettings);
    }

    function renderTabs() {
      elements.tabs.innerHTML = '';
      categories.forEach((category, index) => {
        const button = document.createElement('button');
        button.className = `tab${index === activeCategoryIndex ? ' active' : ''}`;
        button.type = 'button';
        button.innerHTML = `${category.name}<small>${category.english}</small>`;
        button.addEventListener('click', () => {
          activeCategoryIndex = index;
          selectedCode = '';
          renderTabs();
          renderCodes();
          setStatus('');
        });
        elements.tabs.appendChild(button);
      });
    }

    function renderCodes() {
      const category = getActiveCategory();
      elements.title.textContent = category.name;
      elements.count.textContent = `${category.codes.length} codes`;
      elements.codes.innerHTML = '';

      category.codes.forEach(code => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `code-button${code === selectedCode ? ' selected' : ''}`;
        button.textContent = code;
        button.title = `選擇 ${category.name} ${code}`;
        button.addEventListener('click', () => {
          selectedCode = code;
          renderCodes();
          setStatus('');
        });
        button.addEventListener('dblclick', () => sendCode(category, code));
        elements.codes.appendChild(button);
      });

      elements.selectedText.innerHTML = selectedCode
        ? `已選擇：<strong>${category.name} ${selectedCode}</strong>`
        : '尚未選擇代碼';
      elements.sendSelected.disabled = !selectedCode;
    }

    function getActiveCategory() {
      return categories[activeCategoryIndex];
    }

    function buildMessage(categoryName, code) {
      const now = new Date();
      const time = now.toLocaleString('zh-HK', { hour12: false });
      const unit = elements.vehicleId.value.trim();
      const template = elements.messageTemplate.value.trim() || '[{category}] {code}';

      return template
        .replaceAll('{category}', categoryName)
        .replaceAll('{code}', code)
        .replaceAll('{unit}', unit)
        .replaceAll('{time}', time);
    }

    function sendCode(category, code) {
      sendDiscord(buildMessage(category.name, code));
    }

    async function sendDiscord(content) {
      const webhookUrl = 'https://discord.com/api/webhooks/1522586340468985876/LH3FV1LVMqDufAUiIW3ylOZQfxcMX83No5YoYjz9_m1_hkjWJxPf7mt-onnTZQh735U6';

      if (!/^https:\/\/(discord\.com|discordapp\.com)\/api\/webhooks\//.test(webhookUrl)) {
        setStatus('Webhook URL 格式似乎不正確。', true);
        return;
      }

      setStatus('正在送出...');
      elements.sendSelected.disabled = true;
      elements.sendCategory.disabled = true;

      try {
        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: 'Dispatch Code Sender',
            content
          })
        });

        if (!response.ok) {
          throw new Error(`Discord 回應 ${response.status}`);
        }

        saveSettings();
        setStatus(`已送出：${content}`, false, true);
      } catch (error) {
        setStatus(`送出失敗：${error.message}`, true);
      } finally {
        elements.sendSelected.disabled = !selectedCode;
        elements.sendCategory.disabled = false;
      }
    }

    function saveSettings() {
      localStorage.setItem('dispatchUnit', elements.vehicleId.value.trim());
      localStorage.setItem('dispatchTemplate', elements.messageTemplate.value);
    }

    function setStatus(message, isError = false, isOk = false) {
      elements.status.textContent = message;
      elements.status.className = `status${isError ? ' error' : ''}${isOk ? ' ok' : ''}`;
    }

    function updateClock() {
      const now = new Date();
      elements.clockTime.textContent = now.toLocaleTimeString('zh-HK', { hour12: false });
      elements.clockDate.textContent = now.toLocaleDateString('zh-HK', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        weekday: 'short'
      });
    }

    init();
  </script>
</body>
</html>
